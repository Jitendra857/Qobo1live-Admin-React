<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e11d48;stop-opacity:1" /> <!-- Red/Rose -->
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" /> <!-- Pink -->
    </linearGradient>
  </defs>

  <!-- Unique Heart Icon with Red/Pink Gradient -->
  <g transform="translate(10, 10) scale(0.8)">
    <path d="M40 75 C10 45 10 20 30 10 C45 2 60 10 65 25 C70 10 85 2 100 10 C120 20 120 45 90 75 L65 100 Z" fill="url(#heartGradient)" />
    <!-- White Play Button Cutout -->
    <path d="M58 35 L78 48 L58 61 Z" fill="#ffffff" />
    <!-- Pulse Line -->
    <path d="M30 48 H45 L50 35 L55 60 L60 48 H75" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />
  </g>

  <!-- "qobo" Text -->
  <text x="110" y="65" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="48" fill="#0f172a" letter-spacing="-2">qobo</text>
  
  <!-- "1live" Text (Accent color - Keeping purple for theme consistency or changing to red?) 
       User only asked for heart color. I'll keep text matching the theme unless they ask. -->
  <text x="225" y="65" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="48" fill="#8b5cf6" letter-spacing="-2">1live</text>
  
  <!-- Subtle Tagline or Underline (Matched to heart gradient) -->
  <rect x="110" y="75" width="230" height="4" rx="2" fill="url(#heartGradient)" opacity="0.3" />
</svg>
